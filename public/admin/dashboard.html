<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bright Horizons Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/dashboard.css">


</head>

<body>

<nav>

<div class="nav-container">

<h2>Bright Horizons Admin</h2>

<a href="/">View Website</a>
<button id="logout-btn">Logout</button>

</div>

</nav>


<div class="admin-wrapper">

<h2>Course Manager</h2>

<div class="admin-form">

<input id="title" placeholder="Course Title">

<textarea id="description" placeholder="Course Description"></textarea>

<div class="upload-area" id="uploadArea">
Drag & Drop Image Here or Click to Upload
<input type="file" id="image" hidden>
</div>

<img id="imagePreview" class="image-preview" src="" alt="Course preview">

<select id="sampleImage" style="padding:10px; border-radius:6px; border:1px solid #ddd; font-size:0.95rem; margin-bottom:0.5rem;">
<option value="">Or select a sample image...</option>
<option value="/pics/1.JPG">Sample 1</option>
<option value="/pics/2.jpg">Sample 2</option>
<option value="/pics/3.jpg">Sample 3</option>
<option value="/pics/4.JPG">Sample 4</option>
<option value="/pics/5.jpg">Sample 5</option>
</select>

<button onclick="addCourse()">Add Course</button>

</div>

<h3>Courses</h3>

<div id="courses" class="courses-grid"></div>

</div>

<script type="module" src="./js/admin.js"></script>

<script type="module">
import { auth } from "/js/firebase-config.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "/admin/login.html";
    }
});

const logoutBtn = document.getElementById("logout-btn");
if (logoutBtn) {
    logoutBtn.addEventListener("click", async () => {
        try {
            await signOut(auth);
            window.location.href = "/admin/login.html";
        } catch (error) {
            console.error("Sign-out failed", error);
            alert("Unable to sign out");
        }
    });
}

/* DRAG DROP */

const uploadArea = document.getElementById("uploadArea");
const fileInput = document.getElementById("image");

uploadArea.onclick = () => fileInput.click();

uploadArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    uploadArea.style.background = "#eef4ff";
});

uploadArea.addEventListener("dragleave", () => {
    uploadArea.style.background = "transparent";
});

uploadArea.addEventListener("drop", (e) => {
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
    uploadArea.style.background = "transparent";
    setPreview(fileInput.files[0]);
});

const imagePreview = document.getElementById("imagePreview");

const setPreview = (file) => {
    if (!file) {
        imagePreview.style.display = "none";
        imagePreview.src = "";
        return;
    }
    const reader = new FileReader();
    reader.onload = (event) => {
        imagePreview.src = event.target.result;
        imagePreview.style.display = "block";
    };
    reader.readAsDataURL(file);
};

fileInput.addEventListener("change", (e) => {
    setPreview(e.target.files[0]);
});

/* SAMPLE IMAGE SELECT */
const sampleImageSelect = document.getElementById("sampleImage");
sampleImageSelect.addEventListener("change", (e) => {
    if (e.target.value) {
        imagePreview.src = e.target.value;
        imagePreview.style.display = "block";
        fileInput.value = "";
    } else {
        imagePreview.style.display = "none";
    }
});
</script>

</body>
</html>
